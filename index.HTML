<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Lançamento de Notas</title>
</head>
<body>
    <section>
        <h1>LANÇAMENTO DE NOTAS</h1>
        
        <form method="post" action="processar_notas.php">
            <!-- Regra 1: Lista definida (select) para disciplinas -->
            <label for="disciplina">Selecione a disciplina</label>
            <select name="disciplina" id="disciplina">
                <option value="info">Introdução à informática</option>
                <option value="ling">Linguagens de Programação</option>
                <option value="prog">Programação de Computadores</option>
            </select>
            <br><br>

            <!-- Tabela para organizar os campos conforme o protótipo -->
            <table border="1">
                <thead>
                    <tr>
                        <th>Nome do aluno</th>

                        <th>Prova 2</th>
                        <th>Exame</th>
                        <th>Média</th>
                        <th>Faltas</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Exemplo para a aluna Joana da Silva -->
                    <tr>
                        <td>Joana da Silva</td>
                        <td><input type="number" min="0" max="10" required></td>
                        <td><input type="number" min="0" max="10" required></td>
                        <td><input type="number" min="0" max="10"></td>
                        <td><input type="number" readonly=""></td>
                        <td><input type="number" min="0" max="16" required></td>
                    </tr>
                    <!-- Exemplo para a aluna Maria do Socorro -->
                    <tr>
                        <td>Maria do Socorro</td>
                        <td><input type="number" min="0" max="10" required></td>
                        <td><input type="number" min="0" max="10" required></td>
                        <td><input type="number" min="0" max="10"></td>
                        <td><input type="number" readonly=""></td>
                        <td><input type="number" min="0" max="16" required></td>
                    </tr>
                    <!-- Exemplo para o aluno Pedro Santos -->
                    <tr>
                        <td>Pedro Santos</td>
                        <td><input type="number" min="0" max="10" required></td>
                        <td><input type="number" min="0" max="10" required></td>
                        <td><input type="number" min="0" max="10"></td>
                        <td><input type="number" readonly=""></td>
                        <td><input type="number" min="0" max="16" required></td>
                    </tr>
                </tbody>
            </table>
            <br>

            <!-- Botões de ação -->
            <input type="submit" value="Salvar">
            <input type="reset" value="Limpar">
        </form>
    </section>
</body>
</html>
